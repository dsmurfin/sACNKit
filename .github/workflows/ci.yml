name: CI

on:
  push:
    branches: [main, "modernization-*"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & Test (macOS)
    # macos-26 defaults to Xcode 26, whose toolchain satisfies the package's Swift 6.2 floor.
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7
      - name: Swift version
        run: swift --version
      - name: Build
        # Warnings-as-errors locks in the zero-warning state under StrictConcurrency=targeted,
        # including the test target (--build-tests).
        run: swift build --build-tests -Xswiftc -warnings-as-errors
      - name: Test
        run: swift test

  thread-sanitizer:
    name: Thread Sanitizer (macOS)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7
      - name: Test with TSan
        run: swift test --sanitize=thread

  loopback:
    # Non-blocking: multicast DELIVERY does not work on GitHub-hosted macOS
    # runners (binds and multicast joins succeed - the gated group tests pass -
    # but loopback datagrams never arrive), so this check is informational. A
    # failure surfaces as a warning annotation, not a red check (step-level
    # continue-on-error keeps the job green; job-level would still show a
    # failing check on the PR). Promoting this to a required check needs a
    # runner where multicast loopback works (e.g. self-hosted), at which point
    # fold the env var into the thread-sanitizer job and remove this one.
    # The filter avoids duplicating the full TSan suite run; the network-gated
    # tests live in these two suites.
    name: Loopback + TSan (macOS, non-blocking)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7
      - name: Test with network loopback under TSan
        id: loopback
        continue-on-error: true
        run: swift test --sanitize=thread --filter "LoopbackTests|ReceiverGroupTests"
        env:
          SACNKIT_NETWORK_TESTS: "1"
      - name: Surface loopback result
        if: steps.loopback.outcome == 'failure'
        run: echo "::warning title=Loopback tests failed (non-blocking)::Network loopback tests failed on this runner. Multicast delivery is unreliable on shared runners; see the previous step's log before suspecting a regression."

  format:
    name: Format check
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7
      - name: swift-format lint
        run: swift format lint --strict --recursive --configuration .swift-format Sources Tests

# Linux (and, best-effort, Android / Windows) CI is added in Phase 3, once the
# SwiftNIO migration removes the Objective-C CocoaAsyncSocket dependency that
# currently prevents the package from building off-Apple. See MODERNIZATION.md.
